# ───────────────────────────────────────────────────────────────
#  Tesserin Release – Build & publish Electron for all platforms
#
#  Triggers:
#    - Push a tag like "v1.0.0" or "v1.2.3-beta.1"
#    - Manual dispatch from the Actions tab
#
#  Outputs:
#    macOS   → .dmg, .zip (universal: x64 + arm64)
#    Windows → .exe (NSIS installer, x64)
#    Linux   → .AppImage, .deb
#
#  After the build completes, a GitHub Release is created with
#  all binaries attached. Users can download directly from:
#    https://github.com/AnvinX1/Tesserin-pro/releases/latest
# ───────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.8)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build on each platform
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Python setuptools (Windows)
        if: runner.os == 'Windows'
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Import Apple signing certs
        if: matrix.os == 'macos-latest' && env.MACOS_CERTIFICATE != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        continue-on-error: true
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}

      - name: Build renderer
        run: pnpm build

      - name: Build Electron main process
        run: pnpm tsc -p electron/tsconfig.json

      - name: Install packaging tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libarchive-tools

      - name: Clean output directory
        shell: bash
        run: rm -rf release/

      - name: Package Electron app
        # macOS: build arm64 only per-arch to avoid concurrent hardlink EEXIST
        # (dmg + zip targets share the same appOutDir and race on icon.icns)
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            pnpm electron-builder --mac --arm64 --publish never
          else
            pnpm electron-builder --${{ matrix.platform }} --publish never
          fi
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/latest*.yml
            release/*.blockmap
          retention-days: 7
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Create GitHub Release with all platform artifacts
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "name=Tesserin v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "name=Tesserin ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'alpha') }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

