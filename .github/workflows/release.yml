# ───────────────────────────────────────────────────────────────
#  Tesserin Release – Build & publish Electron for all platforms
#
#  Triggers:
#    - Push a tag like "v1.0.0" or "v1.2.3-beta.1"
#    - Manual dispatch from the Actions tab
#
#  Outputs:
#    macOS   → .dmg
#    Windows → .exe (NSIS installer)
#    Linux   → .AppImage, .deb, .rpm
#
#  After the build completes, a GitHub Release is created with
#  all binaries attached. Users can download directly from:
#    https://github.com/AnvinX1/Tesserin-pro/releases/latest
# ───────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Python setuptools (node-gyp needs distutils)
        run: python3 -m pip install setuptools
        if: matrix.os != 'windows-latest'

      - name: Install Python setuptools (Windows)
        run: python -m pip install setuptools
        if: matrix.os == 'windows-latest'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Import Apple signing certs
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build renderer
        run: pnpm build

      - name: Build Electron main process
        run: pnpm tsc -p electron/tsconfig.json

      - name: Package Electron app
        run: pnpm electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: "true"

      - name: Create GitHub Release & upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tesserin ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

