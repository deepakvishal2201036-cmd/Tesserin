# ───────────────────────────────────────────────────────────────
#  Tesserin Release – Build & publish Electron for all platforms
#
#  Triggers:
#    - Push a tag like "v1.0.0" or "v1.2.3-beta.1"
#    - Manual dispatch from the Actions tab
#
#  Outputs:
#    macOS   → .dmg
#    Windows → .exe (NSIS installer)
#    Linux   → .AppImage, .deb, .rpm
#
#  After the build completes, a GitHub Release is created with
#  all binaries attached. Users can download directly from:
#    https://github.com/AnvinX1/Tesserin-pro/releases/latest
# ───────────────────────────────────────────────────────────────
name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build renderer
        run: pnpm build

      - name: Build Electron main process
        run: pnpm tsc -p electron/tsconfig.json

      - name: Package Electron app
        run: pnpm electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tesserin-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: ignore
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
