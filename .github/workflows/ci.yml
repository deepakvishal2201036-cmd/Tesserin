# ───────────────────────────────────────────────────────────────
#  Tesserin CI – Build & verify on every push / PR
# ───────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, dev]
    tags-ignore:
      - 'v*'  # Don't run CI on release tags (release.yml handles those)
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Quick checks (type-check, lint, tests)
  # ─────────────────────────────────────────────────────────────
  check:
    name: Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type-check renderer
        run: pnpm tsc --noEmit

      - name: Type-check electron main
        run: pnpm tsc -p electron/tsconfig.json --noEmit

      - name: Run tests
        run: pnpm test

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build verification on all platforms
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Python setuptools (Windows)
        if: runner.os == 'Windows'
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build renderer
        run: pnpm build

      - name: Build Electron main process
        run: pnpm tsc -p electron/tsconfig.json

      - name: Install packaging tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libarchive-tools

      - name: Package Electron app (dry-run)
        # macOS: build arm64 only to avoid concurrent hardlink EEXIST
        # (dmg + zip targets share the same appOutDir and race on icon.icns)
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            pnpm electron-builder --publish never --mac --arm64
          else
            pnpm electron-builder --publish never --${{ matrix.platform }}
          fi
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
