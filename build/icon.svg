<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="crystal-glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="shard-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#888888" stop-opacity="0.45" />
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="70%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg-glow)" />

  <!-- Geometric shards centred at 256,256 -->
  <g transform="translate(256,256)">
    <!-- Outer diamond shards (top & bottom) -->
    <path d="M-102 -154 L0 -230 L102 -154 L0 -51 Z"
          fill="url(#shard-gradient)" stroke="#333" stroke-width="2" />
    <path d="M-102 154 L0 230 L102 154 L0 51 Z"
          fill="url(#shard-gradient)" stroke="#333" stroke-width="2" />

    <!-- Inner accent shards (left & right) -->
    <path d="M-179 0 L-77 -51 L-77 51 Z" fill="#FACC15" opacity="0.85" />
    <path d="M179 0 L77 -51 L77 51 Z" fill="#FACC15" opacity="0.85" />

    <!-- Central glowing core -->
    <circle r="31" fill="#FACC15" filter="url(#crystal-glow)" />
    <circle r="15" fill="#ffffff" />
  </g>
</svg>
